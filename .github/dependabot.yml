# Automated dependency updates (PLAN §11.5). Weekly, grouped PRs for npm, pip,
# and GitHub Actions — each lands as a reviewable PR that must pass `ci`, giving
# security visibility without manual polling.
version: 2
updates:
  # Frontend npm packages (package.json / package-lock.json at the repo root).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      npm-dependencies:
        patterns: ['*']

  # Python data-pipeline dependencies (data-pipeline/requirements.txt).
  - package-ecosystem: pip
    directory: /data-pipeline
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      pip-dependencies:
        patterns: ['*']

  # GitHub Actions pinned in the CI + deploy workflows (.github/workflows/).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      actions-dependencies:
        patterns: ['*']
