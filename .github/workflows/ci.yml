# Continuous integration (PLAN §11.3). Runs on every pull request and on pushes
# to non-`main` branches (pushes to `main` deploy via deploy.yml instead). Two
# parallel jobs — `data` (Python pipeline) and `web` (Svelte/Vite frontend).
# `ci` becomes the required status check for merging to `main` at S1.8.
name: ci

on:
  pull_request:
  push:
    branches-ignore: [main]

permissions:
  contents: read

jobs:
  # --- Python data pipeline: build gates on fixtures + committed-artifact integrity
  data:
    name: data (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: data-pipeline/requirements.txt

      - name: Install pipeline dependencies
        run: pip install -r data-pipeline/requirements.txt

      # Gates 1–10 + golden on the committed fixture (test_build.py) and integrity
      # over the committed public/data/*.json (test_artifacts.py) — PLAN §10.1.
      # The 92 MB source CSV is not needed: fixtures + committed artifacts only.
      - name: Run pytest
        run: pytest data-pipeline

  # --- Svelte/Vite frontend: typecheck → unit/component tests → production build
  web:
    name: web (check · test · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install (reproducible)
        run: npm ci

      # svelte-check is the load-bearing typecheck: bare `tsc --noEmit` does NOT
      # type-check Svelte component props (empirically proven across S1.1/S1.4/
      # S1.5/S1.6 — a bad prop slips past tsc but svelte-check catches it). Run
      # both so component-prop regressions can't pass CI.
      - name: Type-check components (svelte-check)
        run: npm run check

      - name: Type-check TypeScript (tsc --noEmit)
        run: npm run typecheck

      - name: Unit + component tests (vitest)
        run: npm run test

      # GITHUB_ACTIONS is set on the runner, so vite builds at the Pages base
      # path (/tandem-tbox-explorer/) — this validates the production bundle.
      - name: Production build
        run: npm run build

      # Playwright e2e + visual regression against the production build (PLAN §11.3,
      # §10.4–10.5). The webServer in playwright.config.ts builds + previews at the
      # real Pages base; browsers are the PINNED Playwright build (package.json's
      # exact @playwright/test), so the rendered pixels match the committed
      # CI-Linux baselines.
      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium

      - name: e2e + visual regression (Playwright)
        run: npx playwright test

      # On failure: the HTML report (PLAN §11.3) plus the snapshot artifacts — the
      # committed baselines, any newly-written baselines (first run), and the
      # per-run actuals under test-results/ — so a missing OR mismatched CI-Linux
      # visual baseline (§10.5) can be seeded/refreshed from one download. Never
      # runs on a green build.
      - name: Upload Playwright report + snapshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report/
            test-results/
            tests/e2e/__screenshots__/
          retention-days: 7
          if-no-files-found: ignore
